<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <center>
        <h1>Sign Up Form</h1>
        <form>
            <label>Full Name:</label>
            <input type="text" placeholder="........."/><br><br>
            <label>Enter Password:</label>
            <input type="password" placeholder="**********"/><br><br>
            <label>Email:</label>
            <input type="email" placeholder="^^^^^^^^^^^^^@gmail.com"/><br><br>
            <label>Gender</label>
            <input type="radio" name="gender" value="gender"/>Male
            <input type="radio" name="gender" value="gender"/>Female<br><br>
            <label>Skills</label>
            <input type="checkbox"/>HTML
            <input type="checkbox"/>CSS <br><br>
            <label>Enter DOB:</label>
            <input type="date"/> <br><br>
            <label>Time:</label>
            <input type="time"/> <br><br>
            <label>Search:</label>
            <input type="search" placeholder="Search Field" /> <br><br>
            <input type="color" />
            <input type="range" /> <br><br>
            <input type="submit" /> 
            <input type="reset" />
        </form>
    </center>
</body>
</html>
